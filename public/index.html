<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lắc Downloader - Tải nhạc SoundCloud chất lượng gốc - Dán link và tải về ngay">
  <title>Lắc Downloader - Tải Nhạc Chất Lượng Gốc</title>
  <link rel="shortcut icon" href="/logo.png" type="image/png">
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Header -->
    <header class="header">
      <!-- User Auth Bar -->
      <div class="user-bar">
        <div id="userGuest" class="user-guest">
          <button id="loginOpenBtn" class="btn-auth">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            <span>Đăng Nhập</span>
          </button>
        </div>
        <div id="userProfile" class="user-profile hidden">
          <div class="user-avatar-wrapper" title="Bấm vào Avatar để Nạp VIP / Đổi Ảnh">
            <div class="user-avatar" id="userAvatar">U</div>
            <button id="changeAvatarBtn" class="btn-change-avatar" title="Đổi ảnh đại diện">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </button>
            <input type="file" id="avatarFileInput" accept="image/*" class="hidden">
          </div>
          <div class="user-info" id="userInfoClickArea" title="Bấm để Nạp VIP">
            <span class="user-name" id="userName">User</span>
            <span class="user-badge" id="userBadge">Khách</span>
          </div>
          <button id="logoutBtn" class="btn-logout" title="Đăng xuất">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="logo">
        <div class="logo-icon">
          <img src="logo.png" alt="Lắc Downloader Logo" class="brand-logo-img">
        </div>
        <div class="logo-text">
          <h1>Lắc <span class="gradient-text">Downloader</span></h1>
          <p class="tagline">Tải Nhạc & Video YouTube, SoundCloud • MP3 320kbps & Full HD MP4</p>
        </div>
      </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <div class="glass-card search-card">
        <div class="input-wrapper">
          <div class="input-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
          </div>
          <input type="url" id="urlInput" placeholder="Dán link YouTube hoặc SoundCloud vào đây..." autocomplete="off"
            spellcheck="false">
          <button id="clearBtn" class="clear-btn hidden" title="Xóa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <button id="fetchBtn" class="btn-primary">
          <span class="btn-content">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span>Lấy Thông Tin</span>
          </span>
          <div class="btn-loader hidden">
            <div class="spinner"></div>
            <span>Đang xử lý...</span>
          </div>
        </button>
      </div>
    </section>

    <!-- Error Message -->
    <div id="errorMsg" class="error-message hidden">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <line x1="15" y1="9" x2="9" y2="15" />
        <line x1="9" y1="9" x2="15" y2="15" />
      </svg>
      <span id="errorText"></span>
    </div>

    <!-- Result Section -->
    <section id="resultSection" class="result-section hidden">
      <div class="glass-card result-card">
        <div class="track-info">
          <div class="track-thumbnail-wrapper">
            <img id="trackThumbnail" src="" alt="Album art" class="track-thumbnail">
            <div class="thumbnail-overlay">
              <div class="play-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                  <polygon points="5,3 19,12 5,21" />
                </svg>
              </div>
            </div>
          </div>
          <div class="track-details">
            <h2 id="trackTitle" class="track-title"></h2>
            <p id="trackArtist" class="track-artist"></p>
            <div class="track-meta">
              <div class="meta-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12,6 12,12 16,14" />
                </svg>
                <span id="trackDuration"></span>
              </div>
              <div class="meta-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 18V5l12-2v13" />
                  <circle cx="6" cy="18" r="3" />
                  <circle cx="18" cy="16" r="3" />
                </svg>
                <span id="trackFormat"></span>
              </div>
              <div class="meta-item" id="trackSizeMeta">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7,10 12,15 17,10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                <span id="trackSize"></span>
              </div>
              <div class="meta-item" id="trackViewsMeta">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <span id="trackViews"></span>
              </div>
            </div>
            <div class="quality-badge" id="qualityBadge">
              <span class="badge-glow"></span>
              <svg id="qualityIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22,4 12,14.01 9,11.01" />
              </svg>
              <span id="qualityText">Chất lượng cao</span>
            </div>
          </div>
        </div>

        <!-- Waveform Animation -->
        <div class="waveform">
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
        </div>

        <div class="format-selector">
          <span class="format-label">Định dạng tải:</span>
          <div class="format-buttons">
            <button class="format-btn active" data-format="mp3" id="formatMp3">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
              </svg>
              🎵 MP3 320k
            </button>
            <button class="format-btn" data-format="mp4_1080" id="formatMp41080">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7" />
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
              </svg>
              🎬 Video 1080p
            </button>
            <button class="format-btn" data-format="mp4_720" id="formatMp4720">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" />
                <line x1="7" y1="2" x2="7" y2="22" />
                <line x1="17" y1="2" x2="17" y2="22" />
              </svg>
              📱 Video 720p
            </button>
            <button class="format-btn" data-format="wav" id="formatWav">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 10v4M6 6v12M10 3v18M14 8v8M18 5v14M22 10v4" />
              </svg>
              🎼 WAV
            </button>
            <button class="format-btn" data-format="original" id="formatOriginal">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              ⭐ Gốc
            </button>
          </div>
        </div>

        <!-- Download Button -->
        <button id="downloadBtn" class="btn-download">
          <span class="btn-content">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7,10 12,15 17,10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>Tải Về Ngay</span>
          </span>
          <div class="btn-loader hidden">
            <div class="spinner"></div>
            <span>Đang tải...</span>
          </div>
        </button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>🎵 Được tạo cho mục đích cá nhân • Hỗ trợ tải nhạc SoundCloud tốc độ cao</p>
    </footer>
  </div>

  <!-- Modal Auth (Đăng nhập / Đăng ký) -->
  <div id="authModal" class="modal-overlay hidden">
    <div class="modal-card glass-card">
      <button class="modal-close" id="authModalClose">&times;</button>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLoginBtn">Đăng Nhập</button>
        <button class="auth-tab" id="tabRegisterBtn">Đăng Ký</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập..." required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPassword" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
        </div>
        <div class="auth-error hidden" id="loginError"></div>
        <button type="submit" class="btn-primary auth-submit">
          <span>Đăng Nhập</span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form hidden">
        <div class="form-group">
          <label>Tên hiển thị</label>
          <input type="text" id="regName" placeholder="Ví dụ: Nguyễn Văn A..." required>
        </div>
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" id="regUsername" placeholder="Nhập tên đăng nhập..." required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="regPassword" placeholder="Nhập mật khẩu..." required autocomplete="new-password">
        </div>
        <div class="auth-error hidden" id="regError"></div>
        <button type="submit" class="btn-primary auth-submit">
          <span>Tạo Tài Khoản</span>
        </button>
      </form>
    </div>
  </div>


  <script src="app.js"></script>
</body>

</html>
